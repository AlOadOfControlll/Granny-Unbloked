<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Void Jump | Glitch Bound Studios</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: monospace; overflow: hidden; text-align: center; }
        canvas { background: #000; display: block; margin: 0 auto; border-bottom: 3px solid #333; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        h1 { font-size: 50px; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; margin: 10px; }
        .studio-text { color: #ff00ff; letter-spacing: 3px; font-size: 14px; margin-bottom: 20px; }
        .instr { font-size: 12px; color: #888; margin-bottom: 10px; }
        input { background: #111; border: 2px solid #ff00ff; color: white; padding: 15px; font-size: 20px; margin: 10px; text-align: center; outline: none; width: 250px; }
        button { background: transparent; color: #00ffcc; border: 2px solid #00ffcc; padding: 12px 30px; font-size: 18px; cursor: pointer; margin: 10px; transition: 0.2s; }
        button:hover { background: #00ffcc; color: black; }
        #ui { position: absolute; top: 15px; left: 15px; text-align: left; font-size: 16px; color: #00ffcc; pointer-events: none; z-index: 10; }
        .shop-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px; max-height: 300px; overflow-y: auto; padding: 10px; width: 450px; }
        .skin-card { border: 1px solid #444; padding: 8px; cursor: pointer; background: #111; font-size: 10px; }
        #watermark { position: absolute; bottom: 10px; right: 10px; font-size: 12px; color: rgba(255,255,255,0.3); pointer-events: none; }
    </style>
</head>
<body>
    <div id="watermark">MADE BY GLITCHBOUNDSTUDIOS</div>
    
    <div id="ui">
        ID: <span id="ui-id">?</span><br>
        COINS: <span id="ui-coins" style="color:#ffd700">0</span>
    </div>

    <!-- LOGIN / SIGN UP PAGE -->
    <div id="nameMenu" class="overlay" style="display:flex">
        <div class="studio-text">GLITCH BOUND STUDIOS</div>
        <h1>IDENTITY SYNC</h1>
        <p class="instr">NEW? Enter a name/pass to CREATE account.<br>RETURNING? Enter your details to LOG IN.</p>
        <input type="text" id="uIn" placeholder="USERNAME">
        <input type="password" id="pIn" placeholder="PASSWORD">
        <button onclick="auth()">SYNC VOID</button>
    </div>

    <!-- MAIN MENU -->
    <div id="mainMenu" class="overlay">
        <div class="studio-text">GLITCH BOUND STUDIOS</div>
        <h1>VOID JUMP</h1>
        <button onclick="start()">START RUN</button>
        <button onclick="showShop(true)">THE VAULT</button>
        <button onclick="location.reload()">LOGOUT</button>
    </div>

    <!-- SHOP -->
    <div id="shopMenu" class="overlay">
        <h1>THE VAULT</h1>
        <div id="vCoins" style="color:#ffd700; margin-bottom:10px;">Coins: 0</div>
        <div class="shop-grid" id="skinList"></div>
        <button onclick="showShop(false)">BACK</button>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let user = null, active = false, score = 0, frame = 0, particles = [];
        let player = { x: canvas.width/2, y: canvas.height - 120 };
        let obstacles = [], vCoins = [];

        // Generate 50 Skins
        let skins = [];
        for(let i=0; i<50; i++) skins.push({id: i, color: `hsl(${i*55}, 70%, 50%)`, price: i*20});

        function auth() {
            const u = document.getElementById('uIn').value.trim();
            const p = document.getElementById('pIn').value.trim();
            if(!u || !p) return;

            let db = JSON.parse(localStorage.getItem('gb_data')) || {};
            
            // ADMIN ACCESS
            if(u === "glitchboundstudio" && p === "glitchboundstudio") {
                user = { name: "Admin", coins: 99999, owned: skins.map(s=>s.id), sel: 1, high: 999 };
            } else if(db[u]) {
                if(db[u].pass === p) user = db[u]; else { alert("WRONG PASS"); return; }
            } else {
                user = { name: u, pass: p, coins: 0, owned:, sel: 0, high: 0 };
                db[u] = user;
                localStorage.setItem('gb_data', JSON.stringify(db));
            }

            document.getElementById('nameMenu').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'flex';
            document.getElementById('ui-id').innerText = user.name.toUpperCase();
            updateUI();
        }

        function showShop(val) {
            document.getElementById('mainMenu').style.display = val ? 'none' : 'flex';
            document.getElementById('shopMenu').style.display = val ? 'flex' : 'none';
            if(val) {
                const list = document.getElementById('skinList'); list.innerHTML = '';
                skins.forEach(s => {
                    const isOwned = user.owned.includes(s.id);
                    list.innerHTML += `<div class="skin-card" onclick="buy(${s.id})" style="border-color:${user.sel==s.id?'#00ffcc':'#444'}">
                        <div style="width:20px;height:20px;background:${s.color};margin:auto;"></div>
                        ${isOwned ? 'EQUIP' : s.price+'C'}</div>`;
                });
                document.getElementById('vCoins').innerText = "Coins: " + user.coins;
            }
        }

        function buy(id) {
            if(user.owned.includes(id)) { user.sel = id; }
            else if(user.coins >= skins[id].price) {
                user.coins -= skins[id].price; user.owned.push(id); user.sel = id;
            }
            save(); showShop(true); updateUI();
        }

        function save() {
            if(user.name === "Admin") return;
            let db = JSON.parse(localStorage.getItem('gb_data'));
            db[user.name] = user;
            localStorage.setItem('gb_data', JSON.stringify(db));
        }

        function updateUI() { document.getElementById('ui-coins').innerText = user.coins; }

        function start() {
            document.getElementById('mainMenu').style.display = 'none';
            active = true; score = 0; obstacles = []; vCoins = []; frame = 0; particles = [];
            loop();
        }

        window.addEventListener('mousemove', e => player.x = e.clientX);

        function loop() {
            if(!active) return;
            ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(0,0,canvas.width,canvas.height);

            if(frame % 20 === 0) obstacles.push({x: Math.random()*canvas.width, y: -50, s: 6+(score/12)});
            if(frame % 80 === 0) vCoins.push({x: Math.random()*canvas.width, y: -50});

            // TRAILS
            particles.push({x: player.x, y: player.y+15, l: 1.0});
            particles.forEach((p, i) => {
                p.l -= 0.05; ctx.globalAlpha = p.l; ctx.fillStyle = skins[user.sel].color;
                ctx.fillRect(p.x-2, p.y, 4, 4);
                if(p.l <= 0) particles.splice(i,1);
            });
            ctx.globalAlpha = 1;

            vCoins.forEach((c, i) => {
                c.y += 4; ctx.fillStyle = "gold"; ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, Math.PI*2); ctx.fill();
                if(Math.hypot(player.x-c.x, player.y-c.y) < 30) { vCoins.splice(i, 1); user.coins += 2; updateUI(); save(); }
            });

            obstacles.forEach((o, i) => {
                o.y += o.s; ctx.fillStyle = "white"; ctx.fillRect(o.x-15, o.y, 30, 30);
                if(o.y > player.y-15 && Math.abs(o.x - player.x) < 25) {
                    active = false;
                    if(confirm("REVIVE FOR 50 COINS?")) {
                        if(user.coins >= 50) { user.coins -= 50; active = true; loop(); updateUI(); save(); }
                        else { document.getElementById('mainMenu').style.display = 'flex'; }
                    } else { document.getElementById('mainMenu').style.display = 'flex'; }
                }
                if(o.y > canvas.height) { obstacles.splice(i, 1); score++; }
            });

            ctx.fillStyle = skins[user.sel].color;
            ctx.fillRect(player.x-15, player.y, 30, 30);
            frame++; requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
