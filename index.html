<!DOCTYPE html>
<html>
<head>
    <title>Void Jump</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: white; font-family: 'Courier New', monospace; overflow: hidden; text-align: center; }
        canvas { background: #111; display: block; margin: 0 auto; border-bottom: 5px solid #333; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        h1 { font-size: 60px; color: #00ffcc; text-shadow: 0 0 20px #00ffcc; margin: 0; }
        button { background: transparent; color: #00ffcc; border: 2px solid #00ffcc; padding: 15px 40px; font-size: 25px; cursor: pointer; font-family: inherit; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #00ffcc; color: black; }
        #score { position: absolute; top: 20px; left: 20px; font-size: 30px; color: #00ffcc; pointer-events: none; }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <div id="menu">
        <h1>VOID JUMP</h1>
        <p>Avoid the falling shadows.</p>
        <button onclick="startGame()">START GAME</button>
    </div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const menu = document.getElementById('menu');
        const scoreEl = document.getElementById('score');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let player = { x: canvas.width/2, y: canvas.height - 80, size: 30, color: '#00ffcc' };
        let enemies = [];
        let score = 0;
        let gameActive = false;
        let frame = 0;

        function startGame() {
            menu.style.display = 'none';
            score = 0;
            enemies = [];
            player.x = canvas.width/2;
            gameActive = true;
            animate();
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') player.x -= 40;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') player.x += 40;
        });

        function animate() {
            if (!gameActive) return;
            ctx.fillStyle = 'rgba(10, 10, 10, 0.2)'; // Motion blur effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Create enemies
            if (frame % 10 === 0) {
                enemies.push({
                    x: Math.random() * canvas.width,
                    y: -50,
                    size: Math.random() * 40 + 20,
                    speed: Math.random() * 5 + 3
                });
            }

            // Draw Player
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillRect(player.x - player.size/2, player.y, player.size, player.size);

            // Handle Enemies
            enemies.forEach((en, index) => {
                en.y += en.speed;
                ctx.fillStyle = '#444';
                ctx.shadowBlur = 0;
                ctx.fillRect(en.x, en.y, en.size, en.size);

                // Collision Detection
                if (en.y + en.size > player.y && en.x < player.x + player.size/2 && en.x + en.size > player.x - player.size/2) {
                    gameOver();
                }

                // Remove off-screen enemies
                if (en.y > canvas.height) {
                    enemies.splice(index, 1);
                    score++;
                    scoreEl.innerText = "Score: " + score;
                }
            });

            frame++;
            requestAnimationFrame(animate);
        }

        function gameOver() {
            gameActive = false;
            alert("GAME OVER! Score: " + score);
            menu.style.display = 'flex';
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
