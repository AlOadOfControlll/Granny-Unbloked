<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Void Jump | Glitch Bound Studios</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Courier New', monospace; overflow: hidden; text-align: center; }
        canvas { background: #000; display: block; margin: 0 auto; border-bottom: 5px solid #333; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #settingsMenu, #shopMenu, #menu, #nameMenu, #deathMenu, #pauseMenu { display: none; }
        h1 { font-size: 60px; color: #00ffcc; text-shadow: 0 0 20px #00ffcc; margin: 10px; }
        .studio-name { color: #ff00ff; font-size: 14px; letter-spacing: 3px; margin-bottom: 20px; }
        input { background: #111; border: 2px solid #ff00ff; color: white; padding: 12px; font-size: 18px; text-align: center; margin: 10px; outline: none; }
        button { background: transparent; color: #00ffcc; border: 2px solid #00ffcc; padding: 10px 25px; font-size: 16px; cursor: pointer; margin: 5px; border-radius: 4px; transition: 0.2s; }
        button:hover { background: #00ffcc; color: black; }
        #ui { position: absolute; top: 15px; left: 15px; text-align: left; font-size: 16px; color: #00ffcc; z-index: 10; pointer-events: none; }
        .shop-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-height: 250px; overflow-y: auto; padding: 10px; border: 1px solid #333; }
        .skin-card { border: 1px solid #444; padding: 8px; cursor: pointer; background: #111; font-size: 10px; }
        .selected { border-color: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
        #abilityInfo { color: #ffd700; margin: 10px; font-size: 14px; min-height: 40px; border: 1px dashed #444; padding: 10px; }
    </style>
</head>
<body>
    <div id="ui">
        ID: <span id="ui-id">?</span> | LVL: <span id="ui-lvl">1</span><br>
        COINS: <span id="ui-coins" style="color:#ffd700">0</span><br>
        BEST: <span id="ui-best">0</span>
    </div>

    <!-- SIGN IN / LOG IN SCREEN -->
    <div id="nameMenu" class="overlay" style="display:flex">
        <div class="studio-name">GLITCH BOUND SECURE SYNC</div>
        <h1>IDENTITY?</h1>
        <p style="color:#888; font-size: 12px;">FIRST TIME? Entering a new name & pass will <b>CREATE</b> your account.<br>RETURNING? Enter your details to <b>LOG IN</b>.</p>
        <input type="text" id="userIn" placeholder="USERNAME">
        <input type="password" id="passIn" placeholder="PASSWORD">
        <button onclick="handleAuth()">SYNC DATA</button>
    </div>

    <!-- MAIN MENU -->
    <div id="menu" class="overlay">
        <h1>VOID JUMP</h1>
        <button onclick="startGame()">START RUN</button>
        <button onclick="toggleMenu('shopMenu', true)">THE VAULT (SKINS)</button>
        <button onclick="toggleMenu('settingsMenu', true)">SETTINGS</button>
    </div>

    <!-- PAUSE MENU -->
    <div id="pauseMenu" class="overlay">
        <h1 style="color:#ff00ff">PAUSED</h1>
        <button onclick="togglePause()">RESUME</button>
        <button onclick="location.reload()">QUIT TO MENU</button>
    </div>

    <!-- SHOP / ABILITY VIEWER -->
    <div id="shopMenu" class="overlay">
        <h1>THE VAULT</h1>
        <div id="shopCoinDisplay" style="color:#ffd700">Coins: 0</div>
        <div id="abilityInfo">Select a skin to see its Power Module</div>
        <div class="shop-grid" id="skinList"></div>
        <button onclick="toggleMenu('menu', true)">BACK</button>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let currentUser = null, gameActive = false, isPaused = false;
        let player = { x: 400, y: 500, vx: 0, vy: 0 };
        
        // 50 UNIQUE ABILITIES
        const powers = ["DASH", "GHOST", "MAGNET", "SLOW-MO", "DOUBLE-JUMP", "GRAVITY-FLIP", "SHIELD", "TIME-STOP", "COIN-X2", "FLY"];
        const skins = Array.from({length: 50}, (_, i) => ({
            id: i,
            name: 'Skin ' + (i+1),
            color: i === 0 ? '#00ffcc' : `hsl(${i * 55}, 70%, 50%)`,
            price: i * 40,
            ability: powers[i % powers.length],
            desc: `Press [SHIFT] or [E] to trigger ${powers[i % powers.length]}.`
        }));

        async function handleAuth() {
            const u = document.getElementById('userIn').value;
            const p = document.getElementById('passIn').value;

            // ADMIN ACCESS
            if(u === "glitchboundstudio" && p === "glitchboundstudio") {
                login({ name: "CREATOR", coins: "∞", high: 99999, owned: skins.map(s=>s.id), sel: 0, isAdmin: true });
                return;
            }

            let users = JSON.parse(localStorage.getItem('vj_users')) || {};
            if(users[u]) {
                if(users[u].pass === p) login(users[u]); else alert("INVALID PASS");
            } else {
                let newUser = { name: u, pass: p, coins: 0, high: 0, owned:, sel: 0 };
                users[u] = newUser; localStorage.setItem('vj_users', JSON.stringify(users)); login(newUser);
            }
        }

        function login(data) {
            currentUser = data;
            document.querySelectorAll('.overlay').forEach(m => m.style.display = 'none');
            document.getElementById('menu').style.display = 'flex';
            updateUI();
        }

        function togglePause() {
            if (!gameActive) return;
            isPaused = !isPaused;
            document.getElementById('pauseMenu').style.display = isPaused ? 'flex' : 'none';
        }

        // --- SHOP & ABILITY DISPLAY ---
        function renderShop() {
            const list = document.getElementById('skinList'); list.innerHTML = '';
            skins.forEach(s => {
                const owned = currentUser.owned.includes(s.id);
                list.innerHTML += `<div class="skin-card ${currentUser.sel==s.id?'selected':''}" onclick="viewSkin(${s.id})">
                    <div style="width:20px;height:20px;background:${s.color};margin:auto"></div>
                    ${owned ? 'OWNED' : s.price+'C'}</div>`;
            });
            document.getElementById('shopCoinDisplay').innerText = "Coins: " + currentUser.coins;
        }

        function viewSkin(id) {
            const s = skins[id];
            document.getElementById('abilityInfo').innerHTML = `<b>${s.name}</b><br>POWER: ${s.ability}<br><small>${s.desc}</small>`;
            
            // Purchase/Equip logic
            if (currentUser.owned.includes(id)) { currentUser.sel = id; } 
            else if (currentUser.isAdmin || currentUser.coins >= s.price) {
                if(!currentUser.isAdmin) currentUser.coins -= s.price;
                currentUser.owned.push(id); currentUser.sel = id;
            }
            renderShop(); updateUI();
        }

        // --- CONTROLS ---
        window.addEventListener('keydown', (e) => {
            if(e.code === 'KeyP' || e.code === 'Escape') togglePause();
            if(isPaused) return;

            if(e.code === 'KeyD' || e.code === 'ArrowRight') player.vx = 8;
            if(e.code === 'KeyA' || e.code === 'ArrowLeft') player.vx = -8;
            
            // ABILITY KEYS (SHIFT or E)
            if(e.code === 'ShiftLeft' || e.code === 'KeyE') {
                const ability = skins[currentUser.sel].ability;
                console.log("Triggered Ability: " + ability);
                // Specific ability logic would go here
            }
        });

        window.addEventListener('keyup', (e) => { player.vx = 0; });

        function startGame() {
            document.querySelectorAll('.overlay').forEach(m => m.style.display = 'none');
            gameActive = true; loop();
        }

        function loop() {
            if (!gameActive || isPaused) return;
            ctx.fillStyle = "rgba(0,0,0,0.2)"; // Trail Effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            player.x += player.vx;
            ctx.fillStyle = skins[currentUser.sel].color;
            ctx.shadowBlur = 15; ctx.shadowColor = skins[currentUser.sel].color;
            ctx.fillRect(player.x, player.y, 30, 30);
            ctx.shadowBlur = 0;

            requestAnimationFrame(loop);
        }

        function toggleMenu(id, show) {
            document.querySelectorAll('.overlay').forEach(m => m.style.display = 'none');
            document.getElementById(id).style.display = show ? 'flex' : 'none';
            if(id === 'shopMenu') renderShop();
        }

        function updateUI() {
            document.getElementById('ui-coins').innerText = currentUser.coins;
            document.getElementById('ui-best').innerText = currentUser.high;
            document.getElementById('ui-id').innerText = currentUser.name;
        }
    </script>
</body>
</html>
