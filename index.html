<!DOCTYPE html>
<html>
<head>
    <title>Out of Sight</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; color: white; font-family: sans-serif; }
        #instructions { position: absolute; top: 50%; left: 50%; transform: translate(-50%; -50%); text-align: center; z-index: 10; cursor: pointer; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 10px; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 1px solid white; border-radius: 50%; pointer-events: none; }
        #inventory { position: absolute; bottom: 20px; left: 20px; font-size: 20px; text-shadow: 2px 2px black; }
    </style>
</head>
<body>
    <div id="instructions">
        <h1>OUT OF SIGHT</h1>
        <p>CLICK TO ENTER THE ESTATE</p>
        <p>(W,A,S,D to Walk | Mouse to Look)</p>
    </div>
    <div id="crosshair"></div>
    <div id="inventory">Inventory: Empty</div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com",
          "three/addons/": "https://unpkg.com"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let scene, camera, renderer, controls, playerHeight = 1.6;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let prevTime = performance.now();
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let hasKey = false, chaser, keyObj, exitDoor;
        const walls = [];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.Fog(0x020202, 0, 15);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, playerHeight, 0);

            // Flashlight setup
            const flashlight = new THREE.SpotLight(0xffffff, 30, 20, 0.6, 0.5);
            camera.add(flashlight);
            flashlight.target.position.set(0, 0, -1);
            camera.add(flashlight.target);
            scene.add(camera);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, document.body);
            document.getElementById('instructions').addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => document.getElementById('instructions').style.display = 'none');
            controls.addEventListener('unlock', () => document.getElementById('instructions').style.display = 'block');

            const onKeyDown = (e) => { if (e.code === 'KeyW') moveForward = true; if (e.code === 'KeyA') moveLeft = true; if (e.code === 'KeyS') moveBackward = true; if (e.code === 'KeyD') moveRight = true; };
            const onKeyUp = (e) => { if (e.code === 'KeyW') moveForward = false; if (e.code === 'KeyA') moveLeft = false; if (e.code === 'KeyS') moveBackward = false; if (e.code === 'KeyD') moveRight = false; };
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // --- Loading YOUR Images ---
            const loader = new THREE.TextureLoader();
            const wallTex = loader.load('wall.png');
            const floorTex = loader.load('floor.png');
            floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
            floorTex.repeat.set(8, 8);

            // Floor
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.MeshPhongMaterial({ map: floorTex }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Wall Builder
            function createWall(x, z, w, h, d) {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshPhongMaterial({ map: wallTex }));
                wall.position.set(x, h/2, z);
                scene.add(wall);
                walls.push(wall);
            }

            // Simple House Layout
            createWall(0, -10, 20, 4, 1);  // North wall
            createWall(-10, 0, 1, 4, 20);  // West wall
            createWall(10, 0, 1, 4, 20);   // East wall
            createWall(0, 10, 20, 4, 1);   // South wall
            createWall(0, 0, 1, 4, 10);    // Divider wall

            // THE MAN (Using your man.png)
            const spriteMap = loader.load('man.png');
            const spriteMaterial = new THREE.SpriteMaterial({ map: spriteMap });
            chaser = new THREE.Sprite(spriteMaterial);
            chaser.scale.set(2, 3, 1); 
            chaser.position.set(8, 1.5, -8);
            scene.add(chaser);

            // Key (Yellow Box)
            keyObj = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshPhongMaterial({ color: 0xffff00 }));
            keyObj.position.set(-8, 0.5, -8);
            scene.add(keyObj);

            // Exit (Brown Door)
            exitDoor = new THREE.Mesh(new THREE.BoxGeometry(2, 3, 0.5), new THREE.MeshPhongMaterial({ color: 0x3d2b1f }));
            exitDoor.position.set(0, 1.5, 9.5);
            scene.add(exitDoor);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (controls.isLocked) {
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // AI Chase - The Man follows you
                const enemySpeed = 1.4 * delta;
                const dirToPlayer = new THREE.Vector3().subVectors(camera.position, chaser.position).normalize();
                chaser.position.x += dirToPlayer.x * enemySpeed;
                chaser.position.z += dirToPlayer.z * enemySpeed;

                // Caught?
                if (camera.position.distanceTo(chaser.position) < 1.3) {
                    alert("HE SAW YOU.");
                    location.reload();
                }

                // Collect Key
                if (!hasKey && camera.position.distanceTo(keyObj.position) < 1.5) {
                    hasKey = true;
                    scene.remove(keyObj);
                    document.getElementById('inventory').innerText = "Inventory: Master Key";
                }

                // Win Condition
                if (hasKey && camera.position.distanceTo(exitDoor.position) < 2) {
                    alert("YOU ESCAPED OUT OF SIGHT!");
                    location.reload();
                }
            }
            prevTime = time;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
