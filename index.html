<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Void Jump | Glitch Bound Studios</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Courier New', monospace; overflow: hidden; text-align: center; }
        canvas { background: #000; display: block; margin: 0 auto; border-bottom: 5px solid #333; box-shadow: 0 0 50px rgba(0,255,204,0.1); }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #settingsMenu, #shopMenu, #menu, #nameMenu, #deathMenu { display: none; }
        h1 { font-size: 60px; color: #00ffcc; text-shadow: 0 0 20px #00ffcc; margin: 10px; }
        button { background: transparent; color: #00ffcc; border: 2px solid #00ffcc; padding: 10px 25px; font-size: 16px; cursor: pointer; margin: 5px; border-radius: 4px; transition: 0.2s; }
        button:hover { background: #00ffcc; color: black; }
        #ui { position: absolute; top: 15px; left: 15px; text-align: left; font-size: 16px; color: #00ffcc; z-index: 10; pointer-events: none; }
        .shop-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-height: 250px; overflow-y: auto; padding: 10px; border: 1px solid #333; }
        .skin-card { border: 1px solid #444; padding: 8px; cursor: pointer; background: #111; width: 80px; font-size: 10px; }
        .selected { border-color: #00ffcc; background: #003333; }
    </style>
</head>
<body>
    <div id="ui">
        ID: <span id="ui-id">?</span> | LVL: <span id="ui-lvl">1</span><br>
        COINS: <span id="ui-coins" style="color:#ffd700">0</span><br>
        BEST: <span id="ui-best">0</span>
    </div>

    <!-- MAIN MENU -->
    <div id="menu" class="overlay" style="display:flex">
        <h1>VOID JUMP</h1>
        <div id="lb" style="color:#ffd700; margin-bottom: 20px;"></div>
        <button onclick="startGame()">START RUN</button>
        <button onclick="toggleMenu('shopMenu', true)">THE VAULT</button>
        <button onclick="toggleMenu('settingsMenu', true)">SETTINGS</button>
    </div>

    <!-- SETTINGS -->
    <div id="settingsMenu" class="overlay">
        <h1>SETTINGS</h1>
        <p>Movement: WASD / Space</p>
        <p>Dash: SHIFT</p>
        <button onclick="toggleMenu('menu', true)">BACK</button>
    </div>

    <!-- DEATH MENU -->
    <div id="deathMenu" class="overlay">
        <h1 style="color:red">VOIDED</h1>
        <button onclick="startGame()">RESTART</button>
        <button onclick="toggleMenu('shopMenu', true)">SHOP</button>
        <button onclick="location.reload()">LOGOUT</button>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        // --- GAME ENGINE VARIABLES ---
        let currentUser = { name: "PLAYER", coins: 500, high: 0, owned: [0], sel: 0 };
        let gameActive = false, shake = 0, trail = [];
        let player = { x: canvas.width/2, y: canvas.height-100, vx: 0, vy: 0, size: 30 };
        
        const skins = Array.from({length: 50}, (_, i) => ({
            id: i, color: `hsl(${i * 45}, 70%, 50%)`, ability: i === 0 ? "DASH" : "GLIDE"
        }));

        // --- SOUND ENGINE (NO FILES NEEDED) ---
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, dur) {
            const osc = audio.createOscillator();
            const gain = audio.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audio.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + dur);
            osc.connect(gain); gain.connect(audio.destination);
            osc.start(); osc.stop(audio.currentTime + dur);
        }

        // --- CORE GAME LOOP ---
        function startGame() {
            document.querySelectorAll('.overlay').forEach(m => m.style.display = 'none');
            gameActive = true; player.x = canvas.width/2; player.y = canvas.height-100;
            playTone(400, 'square', 0.2);
            loop();
        }

        function loop() {
            if (!gameActive) return;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            
            // --- 1. TRAILS EFFECT ---
            // Instead of clearing the whole screen, we draw a semi-transparent black rectangle
            // This leaves a natural "motion blur" trail behind moving objects
            ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // --- 2. PLAYER & SHADOWS ---
            // Adding "ShadowBlur" creates that glowing neon look
            ctx.shadowBlur = 15;
            ctx.shadowColor = skins[currentUser.sel].color;
            ctx.fillStyle = skins[currentUser.sel].color;
            
            // Update movement
            player.x += player.vx;
            
            // Draw Player
            ctx.fillRect(player.x, player.y, player.size, player.size);
            ctx.shadowBlur = 0; // Reset blur for other elements

            if (player.x < 0 || player.x > canvas.width) triggerDeath();
            requestAnimationFrame(loop);
        }

        function triggerDeath() {
            gameActive = false;
            playTone(100, 'sawtooth', 0.5);
            document.getElementById('deathMenu').style.display = 'flex';
            updateLeaderboard();
        }

        // --- LEADERBOARD & UI ---
        function updateLeaderboard() {
            const bots = [{n: "VoidBot", s: 1200}, {n: "GlitchKing", s: 800}, {n: "NeonUser", s: 500}];
            bots.push({n: "YOU", s: currentUser.high});
            bots.sort((a,b) => b.s - a.s);
            let html = "<h3>LOCAL TOP 5</h3>";
            bots.slice(0,5).forEach((b, i) => html += `<div>${i+1}. ${b.n}: ${b.s}</div>`);
            document.getElementById('lb').innerHTML = html;
        }

        window.addEventListener('keydown', (e) => {
            if(e.code === 'KeyD') player.vx = 8;
            if(e.code === 'KeyA') player.vx = -8;
            if(e.code === 'ShiftLeft') { player.vx *= 3; playTone(600, 'sine', 0.1); }
        });
        window.addEventListener('keyup', (e) => { player.vx = 0; });

        function toggleMenu(id, show) {
            document.querySelectorAll('.overlay').forEach(m => m.style.display = 'none');
            document.getElementById(id).style.display = show ? 'flex' : 'none';
            if(id === 'menu') updateLeaderboard();
        }

        updateLeaderboard();
    </script>
</body>
</html>
