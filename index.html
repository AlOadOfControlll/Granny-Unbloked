<!DOCTYPE html>
<html>
<head>
    <title>Out of Sight - Retro</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: sans-serif; overflow: hidden; text-align: center; }
        canvas { background: #111; border: 3px solid #333; display: block; margin: 20px auto; box-shadow: 0 0 20px red; }
        #ui { position: absolute; top: 10px; width: 100%; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>OUT OF SIGHT</h1>
        <p>Use WASD to Move. Find the Yellow Key and Escape!</p>
    </div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = 800; canvas.height = 600;

        const player = { x: 100, y: 100, size: 20, speed: 4 };
        const man = { x: 600, y: 400, size: 25, speed: 1.5 };
        const key = { x: 400, y: 300, size: 15, collected: false };
        const door = { x: 750, y: 20, w: 40, h: 60 };
        const keys = {};

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            // Movement
            if (keys['KeyW']) player.y -= player.speed;
            if (keys['KeyS']) player.y += player.speed;
            if (keys['KeyA']) player.x -= player.speed;
            if (keys['KeyD']) player.x += player.speed;

            // Simple AI Chase
            let dx = player.x - man.x;
            let dy = player.y - man.y;
            let angle = Math.atan2(dy, dx);
            man.x += Math.cos(angle) * man.speed;
            man.y += Math.sin(angle) * man.speed;

            // Collisions
            if (Math.hypot(player.x - man.x, player.y - man.y) < player.size) {
                alert("THE MAN CAUGHT YOU!"); location.reload();
            }
            if (!key.collected && Math.hypot(player.x - key.x, player.y - key.y) < player.size) {
                key.collected = true;
            }
            if (key.collected && player.x > door.x) {
                alert("YOU ESCAPED!"); location.reload();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Door
            ctx.fillStyle = key.collected ? 'green' : 'maroon';
            ctx.fillRect(door.x, door.h, door.w, door.h);

            // Key
            if (!key.collected) {
                ctx.fillStyle = 'gold';
                ctx.fillRect(key.x, key.y, key.size, key.size);
            }

            // Player (You)
            ctx.fillStyle = 'royalblue';
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // The Man
            ctx.fillStyle = 'red';
            ctx.fillRect(man.x, man.y, man.size, man.size);

            update();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
