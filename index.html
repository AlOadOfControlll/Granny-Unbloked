<!DOCTYPE html>
<html>
<head>
    <title>Out of Sight</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; color: white; font-family: sans-serif; }
        #instructions { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; cursor: pointer; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 1px solid white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>
    <div id="instructions">
        <h1 style="color:red; font-size: 50px; margin:0;">OUT OF SIGHT</h1>
        <p>CLICK TO START</p>
    </div>
    <div id="crosshair"></div>

    <script src="https://cloudflare.com"></script>

    <script>
        let scene, camera, renderer, chaser;
        let moveF = false, moveB = false, moveL = false, moveR = false;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 1, 15);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.PointLight(0xffffff, 1, 20);
            camera.add(light);
            scene.add(camera);

            // FLOOR (Solid Green for now to test)
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(50,50), new THREE.MeshPhongMaterial({color: 0x113311}));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            // THE MAN (A Red Box so it can't fail to load)
            const manGeo = new THREE.BoxGeometry(1, 2.5, 1);
            const manMat = new THREE.MeshPhongMaterial({color: 0xff0000});
            chaser = new THREE.Mesh(manGeo, manMat);
            chaser.position.set(0, 1.25, -10);
            scene.add(chaser);

            document.getElementById('instructions').addEventListener('click', () => {
                document.getElementById('instructions').style.display = 'none';
                document.body.requestPointerLock();
            });

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === document.body) {
                    camera.rotation.y -= e.movementX * 0.002;
                }
            });
            camera.rotation.order = 'YXZ';
        }

        function animate() {
            requestAnimationFrame(animate);
            if (moveF) camera.translateZ(-0.1);
            if (moveB) camera.translateZ(0.1);
            if (moveL) camera.translateX(-0.1);
            if (moveR) camera.translateX(0.1);

            if(chaser) {
                const dir = new THREE.Vector3().subVectors(camera.position, chaser.position).normalize();
                chaser.position.x += dir.x * 0.03;
                chaser.position.z += dir.z * 0.03;
                if(camera.position.distanceTo(chaser.position) < 1.5) {
                    alert("CAUGHT!");
                    location.reload();
                }
            }
            renderer.render(scene, camera);
        }

        document.addEventListener('keydown', (e) => { if(e.code === 'KeyW') moveF = true; if(e.code === 'KeyS') moveB = true; if(e.code === 'KeyA') moveL = true; if(e.code === 'KeyD') moveR = true; });
        document.addEventListener('keyup', (e) => { if(e.code === 'KeyW') moveF = false; if(e.code === 'KeyS') moveB = false; if(e.code === 'KeyA') moveL = false; if(e.code === 'KeyD') moveR = false; });

        init(); animate();
    </script>
</body>
</html>
