<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Void Jump | Glitch Bound Studios</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Courier New', monospace; overflow: hidden; text-align: center; }
        canvas { background: #000; display: block; margin: 0 auto; border-bottom: 5px solid #333; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #settingsMenu, #shopMenu, #menu, #nameMenu, #pauseMenu { display: none; }
        h1 { font-size: 60px; color: #00ffcc; text-shadow: 0 0 20px #00ffcc; margin: 10px; }
        .studio-name { color: #ff00ff; font-size: 14px; letter-spacing: 3px; margin-bottom: 20px; }
        input { background: #111; border: 2px solid #ff00ff; color: white; padding: 12px; font-size: 18px; text-align: center; margin: 10px; outline: none; }
        button { background: transparent; color: #00ffcc; border: 2px solid #00ffcc; padding: 10px 25px; font-size: 16px; cursor: pointer; margin: 5px; border-radius: 4px; transition: 0.2s; }
        button:hover { background: #00ffcc; color: black; }
        #ui { position: absolute; top: 15px; left: 15px; text-align: left; font-size: 16px; color: #00ffcc; z-index: 10; pointer-events: none; }
        .shop-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px; max-height: 300px; overflow-y: auto; padding: 10px; border: 1px solid #333; }
        .skin-card { border: 1px solid #444; padding: 8px; cursor: pointer; background: #111; width: 80px; font-size: 10px; }
        .selected { border-color: #00ffcc; background: #003333; }
    </style>
</head>
<body>
    <div id="ui">
        ID: <span id="ui-id">?</span> | LVL: <span id="ui-lvl">1</span><br>
        COINS: <span id="ui-coins" style="color:#ffd700">0</span><br>
        BEST: <span id="ui-best">0</span>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="nameMenu" class="overlay" style="display:flex">
        <div class="studio-name">GLITCH BOUND SECURE LOGIN</div>
        <h1>IDENTITY?</h1>
        <p style="font-size: 12px; color: #888;">Enter Username and Password. Admins use master credentials.</p>
        <input type="text" id="userIn" placeholder="USERNAME">
        <input type="password" id="passIn" placeholder="PASSWORD">
        <button onclick="handleAuth()">SYNC VOID</button>
    </div>

    <!-- MAIN MENU -->
    <div id="menu" class="overlay">
        <div class="studio-name">GLITCH BOUND STUDIOS</div>
        <h1>VOID JUMP</h1>
        <div id="leaderboard" style="color:#ffd700; margin-bottom: 20px;"></div>
        <button onclick="startGame()">START RUN</button>
        <button onclick="toggleMenu('shopMenu', true)">THE VAULT (SKINS)</button>
        <button onclick="toggleMenu('settingsMenu', true)">CONTROLS</button>
    </div>

    <!-- SHOP -->
    <div id="shopMenu" class="overlay">
        <h1>THE VAULT</h1>
        <div id="shopCoinDisplay" style="color:#ffd700">Coins: 0</div>
        <div class="shop-grid" id="skinList"></div>
        <button onclick="toggleMenu('shopMenu', false)">BACK</button>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let currentUser = null, gameActive = false, isPaused = false;
        let score = 0, player = { x: canvas.width/2, y: canvas.height-100, vx: 0, vy: 0, dashCooldown: 0 };
        
        // Generate 50 skins
        const skins = Array.from({length: 50}, (_, i) => ({ 
            id: i, 
            name: 'Skin ' + (i+1), 
            color: i === 0 ? '#00ffcc' : `hsl(${i * 40}, 70%, 50%)`, 
            price: i * 25, 
            dash: i === 0 // First skin has dash ability
        }));

        async function handleAuth() {
            const u = document.getElementById('userIn').value;
            const p = document.getElementById('passIn').value;

            // ADMIN LOGIN: glitchboundstudio / glitchboundstudio
            if(u === "glitchboundstudio" && p === "glitchboundstudio") {
                login({ 
                    name: "ADMIN", 
                    coins: "∞", 
                    high: 99999, 
                    owned: skins.map(s => s.id), // All skins unlocked
                    sel: 0, 
                    isAdmin: true 
                });
                return;
            }

            // Normal User Logic
            let users = JSON.parse(localStorage.getItem('vj_users')) || {};
            if (users[u]) {
                if (users[u].pass === p) login(users[u]); else alert("ACCESS DENIED");
            } else {
                let newUser = { name: u, pass: p, coins: 0, high: 0, owned: [0], sel: 0 };
                users[u] = newUser; 
                localStorage.setItem('vj_users', JSON.stringify(users));
                login(newUser);
            }
        }

        function login(data) {
            currentUser = data;
            document.getElementById('nameMenu').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
            document.getElementById('ui-id').innerText = data.name.toUpperCase();
            renderBotLeaderboard();
            updateUI();
        }

        function renderBotLeaderboard() {
            const bots = [
                { name: "VoidWalker", score: 5400 },
                { name: "GlitchHunter", score: 4200 },
                { name: "CyberDrifter", score: 2500 }
            ];
            if (currentUser) bots.push({ name: currentUser.name, score: currentUser.high });
            bots.sort((a, b) => b.score - a.score);
            let html = "<h3>GLOBAL LEADERBOARD</h3>";
            bots.forEach((b, i) => html += `<div>${i+1}. ${b.name}: ${b.score}</div>`);
            document.getElementById('leaderboard').innerHTML = html;
        }

        // CONTROLS
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyA') player.vx = -8;
            if (e.code === 'KeyD') player.vx = 8;
            if (e.code === 'ShiftLeft' && skins[currentUser.sel].dash && player.dashCooldown <= 0) {
                player.vx *= 5; // Admin/Skin 1 Dash
                player.dashCooldown = 50;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyA' || e.code === 'KeyD') player.vx = 0;
        });

        function updateUI() {
            document.getElementById('ui-coins').innerText = currentUser.coins;
            document.getElementById('ui-best').innerText = currentUser.high;
        }

        function toggleMenu(id, show) {
            document.getElementById(id).style.display = show ? 'flex' : 'none';
            if (id === 'shopMenu') renderShop();
        }

        function renderShop() {
            const list = document.getElementById('skinList'); list.innerHTML = '';
            skins.forEach(s => {
                const owned = currentUser.owned.includes(s.id);
                list.innerHTML += `<div class="skin-card ${currentUser.sel==s.id?'selected':''}" onclick="buySkin(${s.id})">
                    <div style="width:20px;height:20px;background:${s.color};margin:auto"></div>
                    ${s.name}<br>${owned ? 'EQUIP' : s.price+'C'}</div>`;
            });
            document.getElementById('shopCoinDisplay').innerText = "Coins: " + currentUser.coins;
        }

        function buySkin(id) {
            if (currentUser.owned.includes(id)) { 
                currentUser.sel = id; 
            } else if (currentUser.isAdmin || currentUser.coins >= skins[id].price) {
                if (!currentUser.isAdmin) currentUser.coins -= skins[id].price;
                currentUser.owned.push(id);
                currentUser.sel = id;
            }
            updateUI(); renderShop();
        }

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            gameActive = true;
            loop();
        }

        function loop() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            player.x += player.vx;
            if (player.dashCooldown > 0) player.dashCooldown--;
            ctx.fillStyle = skins[currentUser.sel].color;
            ctx.fillRect(player.x, player.y, 30, 30);
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
