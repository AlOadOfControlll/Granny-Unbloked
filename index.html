<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Void Jump v8.0 | Glitch Bound Studios</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { background: #000; display: block; margin: 0 auto; box-shadow: 0 0 20px #00ffcc; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        #menu, #shopMenu, #deathMenu, #reviveMenu, #pauseMenu { display: none; }
        h1 { font-size: 50px; color: #00ffcc; text-shadow: 0 0 15px #00ffcc; margin: 5px; }
        .studio-name { color: #ff00ff; letter-spacing: 4px; font-size: 12px; margin-bottom: 10px; }
        button { background: transparent; color: #00ffcc; border: 2px solid #00ffcc; padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; border-radius: 4px; transition: 0.2s; }
        button:hover { background: #00ffcc; color: #000; }
        input { background: #111; border: 2px solid #ff00ff; color: white; padding: 10px; text-align: center; margin: 5px; }
        #ui { position: absolute; top: 10px; left: 10px; color: #00ffcc; pointer-events: none; z-index: 10; }
        .shop-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-height: 200px; overflow-y: auto; padding: 10px; border: 1px solid #333; }
        .skin-card { border: 1px solid #444; padding: 5px; cursor: pointer; background: #111; font-size: 10px; width: 70px; }
        .selected { border-color: #ff00ff; background: #220022; }
    </style>
</head>
<body>
    <div id="ui">ID: <span id="u-id">?</span> | COINS: <span id="u-c">0</span> | BEST: <span id="u-b">0</span></div>

    <!-- SIGN IN -->
    <div id="nameMenu" class="overlay" style="display:flex">
        <div class="studio-name">GLITCH BOUND STUDIOS</div>
        <h1>IDENTITY?</h1>
        <p style="font-size:10px; color:#888;">NEW? Use any name/pass to SIGN UP. RETURNING? Enter your details to LOG IN.</p>
        <input type="text" id="userIn" placeholder="USERNAME">
        <input type="password" id="passIn" placeholder="PASSWORD">
        <button onclick="handleAuth()">SYNC VOID</button>
    </div>

    <!-- MAIN MENU -->
    <div id="menu" class="overlay">
        <h1>VOID JUMP</h1>
        <div id="lb" style="color:#ffd700; margin: 10px 0;"></div>
        <button onclick="startGame()">START RUN</button>
        <button onclick="toggleMenu('shopMenu')">THE VAULT</button>
        <button onclick="location.reload()">LOGOUT</button>
    </div>

    <!-- DEATH / REVIVE -->
    <div id="deathMenu" class="overlay">
        <h1 style="color:red">VOIDED</h1>
        <div id="reviveOptions">
            <button onclick="startAd()">📺 WATCH AD (FREE REVIVE)</button>
            <button onclick="payRevive()">💰 PAY 50 COINS</button>
        </div>
        <button onclick="resetToMenu()">MAIN MENU</button>
    </div>

    <!-- SHOP -->
    <div id="shopMenu" class="overlay">
        <h1>VAULT</h1>
        <div id="abilityDesc" style="color:#ff00ff; font-size:12px; margin-bottom:10px;">Select a Skin</div>
        <div class="shop-grid" id="skinList"></div>
        <button onclick="toggleMenu('menu')">BACK</button>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let currentUser = null, gameActive = false, shake = 0, gravity = 0.5;
        let player = { x: 100, y: 100, vx: 0, vy: 0, size: 30, dashCD: 0 };
        
        // --- SOUND ENGINE ---
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        function sfx(f, t, d) {
            const o = audio.createOscillator(), g = audio.createGain();
            o.type = t; o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + d);
            o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime + d);
        }

        // --- SKINS & ABILITIES ---
        const abilities = ["DASH", "GHOST", "LOW-GRAV", "MAGNET", "SIZE-DOWN"];
        const skins = Array.from({length: 50}, (_, i) => ({
            id: i, color: `hsl(${i * 60}, 70%, 50%)`, price: i * 50,
            power: abilities[i % abilities.length]
        }));

        // --- AUTH ---
        function handleAuth() {
            const u = document.getElementById('userIn').value, p = document.getElementById('passIn').value;
            if (u === "glitchboundstudio" && p === "glitchboundstudio") {
                login({ name: "ADMIN", coins: 999999, high: 0, owned: skins.map(s=>s.id), sel: 0, isAdmin: true });
                return;
            }
            let users = JSON.parse(localStorage.getItem('vj_users')) || {};
            if (users[u]) login(users[u]);
            else {
                let n = { name: u, pass: p, coins: 0, high: 0, owned: [0], sel: 0 };
                users[u] = n; localStorage.setItem('vj_users', JSON.stringify(users)); login(n);
            }
        }

        function login(data) {
            currentUser = data; document.getElementById('nameMenu').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
            updateUI(); updateLB();
        }

        // --- GAMEPLAY ---
        function startGame() {
            document.querySelectorAll('.overlay').forEach(m => m.style.display = 'none');
            gameActive = true; player.y = 100; player.vy = 0; sfx(400, 'square', 0.1); loop();
        }

        function triggerDeath() {
            gameActive = false; shake = 20; sfx(100, 'sawtooth', 0.4);
            document.getElementById('deathMenu').style.display = 'flex';
        }

        function resetToMenu() {
            document.getElementById('deathMenu').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
        }

        function startAd() {
            document.getElementById('reviveOptions').innerHTML = "<h1>AD PLAYING... 10s</h1>";
            setTimeout(() => {
                document.getElementById('reviveOptions').innerHTML = `<button onclick="startAd()">📺 WATCH AD</button><button onclick="payRevive()">💰 PAY 50</button>`;
                startGame();
            }, 5000); // 5 sec dummy ad
        }

        function payRevive() {
            if (currentUser.isAdmin || currentUser.coins >= 50) {
                if(!currentUser.isAdmin) currentUser.coins -= 50;
                startGame();
            } else alert("Not enough coins!");
        }

        function loop() {
            if (!gameActive) return;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            
            if (shake > 0) { ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake *= 0.9; }

            // Physics
            player.vy += gravity; player.y += player.vy; player.x += player.vx;
            if (player.y > canvas.height) triggerDeath();

            // Draw Player
            ctx.shadowBlur = 15; ctx.shadowColor = skins[currentUser.sel].color;
            ctx.fillStyle = skins[currentUser.sel].color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
            ctx.shadowBlur = 0;

            requestAnimationFrame(loop);
        }

        // --- CONTROLS ---
        window.addEventListener('keydown', e => {
            if (e.code === 'KeyD') player.vx = 7;
            if (e.code === 'KeyA') player.vx = -7;
            if (e.code === 'Space') player.vy = -10;
            if (e.code === 'ShiftLeft') { // ABILITY
                const p = skins[currentUser.sel].power;
                if (p === "DASH") player.x += player.vx * 10;
                sfx(600, 'sine', 0.1);
            }
        });
        window.addEventListener('keyup', () => player.vx = 0);

        function toggleMenu(id) {
            document.querySelectorAll('.overlay').forEach(m => m.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
            if (id === 'shopMenu') renderShop();
        }

        function renderShop() {
            const list = document.getElementById('skinList'); list.innerHTML = '';
            skins.forEach(s => {
                const owned = currentUser.owned.includes(s.id);
                list.innerHTML += `<div class="skin-card ${currentUser.sel==s.id?'selected':''}" onclick="buySkin(${s.id})">
                <div style="width:20px;height:20px;background:${s.color};margin:auto"></div>
                ${owned ? 'EQUIP' : s.price+'C'}</div>`;
            });
        }

        function buySkin(id) {
            const s = skins[id]; document.getElementById('abilityDesc').innerText = `POWER: ${s.power}`;
            if (currentUser.owned.includes(id)) currentUser.sel = id;
            else if (currentUser.isAdmin || currentUser.coins >= s.price) {
                if(!currentUser.isAdmin) currentUser.coins -= s.price;
                currentUser.owned.push(id); currentUser.sel = id;
            }
            renderShop(); updateUI();
        }

        function updateUI() {
            document.getElementById('u-id').innerText = currentUser.name;
            document.getElementById('u-c').innerText = currentUser.coins;
            document.getElementById('u-b').innerText = currentUser.high;
        }

        function updateLB() {
            document.getElementById('lb').innerHTML = "LEADERBOARD: 1. GlitchKing: 5000 | 2. YOU: " + currentUser.high;
        }
    </script>
</body>
</html>
