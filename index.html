<!DOCTYPE html>
<html>
<head>
    <title>Void Jump | Glitch Bound</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: monospace; overflow: hidden; text-align: center; }
        canvas { background: #000; display: block; margin: 0 auto; border-bottom: 3px solid #333; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        input { background: #111; border: 2px solid #ff00ff; color: white; padding: 15px; font-size: 20px; margin: 10px; text-align: center; }
        button { background: #00ffcc; color: black; border: none; padding: 15px 40px; font-size: 20px; cursor: pointer; font-weight: bold; margin: 5px; }
        #ui { position: absolute; top: 10px; left: 10px; text-align: left; font-size: 18px; color: #00ffcc; pointer-events: none; z-index: 10; }
        .shop-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 10px; }
        .skin-card { border: 1px solid #444; padding: 5px; cursor: pointer; background: #111; width: 60px; font-size: 10px; }
    </style>
</head>
<body>
    <div id="ui">PLAYER: <span id="tag">?</span> | COINS: <span id="coinVal">0</span></div>

    <!-- LOGIN SCREEN (NO CHECKS - JUST ENTER) -->
    <div id="loginScreen" class="overlay">
        <h1 style="color:#ff00ff">GLITCH BOUND LOGIN</h1>
        <input type="text" id="uIn" placeholder="USERNAME">
        <input type="password" id="pIn" placeholder="PASSWORD">
        <button onclick="simpleAuth()">SYNC VOID</button>
    </div>

    <!-- MENU -->
    <div id="mainMenu" class="overlay" style="display:none">
        <h1>VOID JUMP</h1>
        <button onclick="start()">START RUN</button>
        <button onclick="showShop(true)">THE VAULT</button>
    </div>

    <!-- SHOP -->
    <div id="shopScreen" class="overlay" style="display:none">
        <h1>THE VAULT</h1>
        <div id="vCoins" style="color:#ffd700">Coins: 0</div>
        <div class="shop-grid" id="skinList"></div>
        <button onclick="showShop(false)">BACK</button>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let active = false, score = 0, coins = 0, frame = 0, particles = [];
        let player = { x: canvas.width/2, y: canvas.height - 100 };
        let obstacles = [], vCoins = [];
        let skins = [];
        for(let i=0; i<50; i++) skins.push({id: i, color: `hsl(${i*40}, 70%, 50%)`, price: i*25, owned: i===0});
        let selSkin = 0;

        function simpleAuth() {
            const user = document.getElementById('uIn').value;
            // ADMIN SHORTCUT
            if(user.toLowerCase() === "glitchboundstudio") {
                coins = 999999;
                skins.forEach(s => s.owned = true);
            }
            document.getElementById('tag').innerText = user.toUpperCase() || "PLAYER";
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'flex';
            document.getElementById('coinVal').innerText = coins;
        }

        function showShop(val) {
            document.getElementById('mainMenu').style.display = val ? 'none' : 'flex';
            document.getElementById('shopScreen').style.display = val ? 'flex' : 'none';
            if(val) {
                const list = document.getElementById('skinList'); list.innerHTML = '';
                skins.forEach(s => {
                    list.innerHTML += `<div class="skin-card" onclick="buy(${s.id})" style="border-color:${selSkin==s.id?'#00ffcc':'#444'}">
                        <div style="width:20px;height:20px;background:${s.color};margin:auto;"></div>
                        ${s.owned ? 'EQUIP' : s.price+'C'}</div>`;
                });
                document.getElementById('vCoins').innerText = "Coins: " + coins;
            }
        }

        function buy(id) {
            if(skins[id].owned) { selSkin = id; }
            else if(coins >= skins[id].price) { coins -= skins[id].price; skins[id].owned = true; selSkin = id; }
            showShop(true); document.getElementById('coinVal').innerText = coins;
        }

        function start() {
            document.getElementById('mainMenu').style.display = 'none';
            active = true; score = 0; obstacles = []; vCoins = []; frame = 0; particles = [];
            loop();
        }

        window.addEventListener('mousemove', e => player.x = e.clientX);

        function loop() {
            if(!active) return;
            ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(0,0,canvas.width,canvas.height);

            if(frame % 20 === 0) obstacles.push({x: Math.random()*canvas.width, y: -50, s: 5+(score/10)});
            if(frame % 80 === 0) vCoins.push({x: Math.random()*canvas.width, y: -50});

            // TRAILS
            particles.push({x: player.x, y: player.y+15, l: 1.0});
            particles.forEach((p, i) => {
                p.l -= 0.05; ctx.globalAlpha = p.l; ctx.fillStyle = skins[selSkin].color;
                ctx.fillRect(p.x-2, p.y, 4, 4);
                if(p.l <= 0) particles.splice(i,1);
            });
            ctx.globalAlpha = 1;

            vCoins.forEach((c, i) => {
                c.y += 4; ctx.fillStyle = "gold"; ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, Math.PI*2); ctx.fill();
                if(Math.hypot(player.x-c.x, player.y-c.y) < 30) { vCoins.splice(i, 1); coins += 2; document.getElementById('coinVal').innerText = coins; }
            });

            obstacles.forEach((o, i) => {
                o.y += o.s; ctx.fillStyle = "white"; ctx.fillRect(o.x, o.y, 30, 30);
                if(o.y > player.y && Math.abs(o.x - player.x) < 25) {
                    active = false;
                    if(confirm("REVIVE FOR 50 COINS?")) {
                        if(coins >= 50) { coins -= 50; active = true; loop(); document.getElementById('coinVal').innerText = coins; }
                        else { alert("BROKE!"); document.getElementById('mainMenu').style.display = 'flex'; }
                    } else { document.getElementById('mainMenu').style.display = 'flex'; }
                }
                if(o.y > canvas.height) { obstacles.splice(i, 1); score++; }
            });

            ctx.fillStyle = skins[selSkin].color;
            ctx.fillRect(player.x-15, player.y, 30, 30);
            frame++; requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
