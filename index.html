<!DOCTYPE html>
<html>
<head>
    <title>Out of Sight</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; color: white; font-family: sans-serif; }
        #instructions { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 1px solid white; border-radius: 50%; }
        #inventory { position: absolute; bottom: 20px; left: 20px; font-size: 20px; }
    </style>
</head>
<body>
    <div id="instructions">
        <h1>OUT OF SIGHT</h1>
        <p>Click to start</p>
        <p>(W,A,S,D to walk | Mouse to look around)</p>
    </div>
    <div id="crosshair"></div>
    <div id="inventory">Inventory: Empty</div>

    <!-- Import Three.js -->
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'https://unpkg.com';

        let scene, camera, renderer, controls, playerHeight = 1.6;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let prevTime = performance.now();
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let hasKey = false;

        // Game Objects
        let chaser, keyObj, exitDoor;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.Fog(0x050505, 0, 20); // Fog creates horror vibe

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = playerHeight;

            const light = new THREE.PointLight(0xffffff, 10, 10);
            camera.add(light); // Camera acts as a flashlight
            scene.add(camera);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, document.body);
            document.getElementById('instructions').addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => document.getElementById('instructions').style.display = 'none');
            controls.addEventListener('unlock', () => document.getElementById('instructions').style.display = 'block');

            // Movement Events
            const onKeyDown = (event) => {
                switch (event.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                }
            };
            const onKeyUp = (event) => {
                switch (event.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            };
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // Floor & Walls (The House)
            const floorGeo = new THREE.PlaneGeometry(40, 40);
            const floorMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // The Man (Antagonist) - Represented by a Tall Dark Cylinder
            const manGeo = new THREE.CylinderGeometry(0.5, 0.5, 2, 8);
            const manMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
            chaser = new THREE.Mesh(manGeo, manMat);
            chaser.position.set(10, 1, 10);
            scene.add(chaser);

            // The Key
            const keyGeo = new THREE.BoxGeometry(0.2, 0.5, 0.1);
            const keyMat = new THREE.MeshPhongMaterial({ color: 0xffff00 });
            keyObj = new THREE.Mesh(keyGeo, keyMat);
            keyObj.position.set(-5, 0.5, -8);
            scene.add(keyObj);

            // The Exit Door
            const doorGeo = new THREE.BoxGeometry(2, 3, 0.2);
            const doorMat = new THREE.MeshPhongMaterial({ color: 0x442200 });
            exitDoor = new THREE.Mesh(doorGeo, doorMat);
            exitDoor.position.set(0, 1.5, -19);
            scene.add(exitDoor);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (controls.isLocked) {
                // Movement logic
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // AI Chaser logic
                const enemySpeed = 1.8 * delta;
                const dirToPlayer = new THREE.Vector3().subVectors(camera.position, chaser.position).normalize();
                chaser.position.x += dirToPlayer.x * enemySpeed;
                chaser.position.z += dirToPlayer.z * enemySpeed;

                // Collision Check: Capture
                if (camera.position.distanceTo(chaser.position) < 1.2) {
                    alert("The Man caught you.");
                    location.reload();
                }

                // Collision Check: Key
                if (!hasKey && camera.position.distanceTo(keyObj.position) < 1.5) {
                    hasKey = true;
                    scene.remove(keyObj);
                    document.getElementById('inventory').innerText = "Inventory: Master Key";
                }

                // Collision Check: Escape
                if (hasKey && camera.position.distanceTo(exitDoor.position) < 2) {
                    alert("You Escaped the Estate!");
                    location.reload();
                }
            }
            prevTime = time;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
