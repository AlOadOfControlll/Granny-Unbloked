<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Out of Sight</title>
    <style>
        /* CSS SECTION - Handles the UI */
        body { margin: 0; overflow: hidden; background: black; color: white; font-family: 'Courier New', Courier, monospace; }
        #instructions { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; z-index: 100; cursor: pointer;
        }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; border: 1px solid white; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #inventory { position: absolute; bottom: 20px; left: 20px; font-size: 1.2rem; color: #ffcc00; }
        h1 { font-size: 3.5rem; margin: 0; color: #cc0000; text-shadow: 0 0 10px red; }
    </style>
</head>
<body>
    <!-- HTML SECTION - The Menu -->
    <div id="instructions">
        <h1>OUT OF SIGHT</h1>
        <p style="font-size: 1.5rem; color: white;">CLICK ANYWHERE TO ENTER</p>
        <p>(WASD to Move | Mouse to Look)</p>
    </div>
    <div id="crosshair"></div>
    <div id="inventory">Inventory: Empty</div>

    <!-- JAVASCRIPT SECTION - The Game Engine -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com",
          "three/addons/": "https://unpkg.com"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let scene, camera, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let hasKey = false, chaser, keyObj, exitDoor;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x010101);
            scene.fog = new THREE.Fog(0x010101, 0, 15);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 0);

            const flashlight = new THREE.SpotLight(0xffffff, 50, 20, 0.5, 0.5);
            camera.add(flashlight);
            flashlight.target.position.set(0, 0, -1);
            camera.add(flashlight.target);
            scene.add(camera);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new PointerLockControls(camera, document.body);
            const menu = document.getElementById('instructions');

            // CHROMEBOOK START FIX: This forces the game to start on click
            menu.addEventListener('click', () => {
                controls.lock();
                // If the pointer lock fails, we still hide the menu to show the game
                menu.style.display = 'none';
            });

            const onKeyDown = (e) => {
                if (e.code === 'KeyW') moveForward = true;
                if (e.code === 'KeyA') moveLeft = true;
                if (e.code === 'KeyS') moveBackward = true;
                if (e.code === 'KeyD') moveRight = true;
            };
            const onKeyUp = (e) => {
                if (e.code === 'KeyW') moveForward = false;
                if (e.code === 'KeyA') moveLeft = false;
                if (e.code === 'KeyS') moveBackward = false;
                if (e.code === 'KeyD') moveRight = false;
            };
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // TEXTURE LOADER
            const loader = new THREE.TextureLoader();
            const wallTex = loader.load('wall.png');
            const floorTex = loader.load('floor.png');
            floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
            floorTex.repeat.set(10, 10);

            // FLOOR
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.MeshPhongMaterial({ map: floorTex }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // WALLS
            function createWall(x, z, w, h, d) {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshPhongMaterial({ map: wallTex }));
                wall.position.set(x, h/2, z);
                scene.add(wall);
            }
            createWall(0, -15, 30, 4, 1);
            createWall(-15, 0, 1, 4, 30);
            createWall(15, 0, 1, 4, 30);
            createWall(0, 15, 30, 4, 1);

            // ENEMY (THE MAN)
            const spriteMap = loader.load('man.png');
            chaser = new THREE.Sprite(new THREE.SpriteMaterial({ map: spriteMap }));
            chaser.scale.set(2, 3, 1); 
            chaser.position.set(10, 1.5, -10);
            scene.add(chaser);

            // KEY (Yellow Box)
            keyObj = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshPhongMaterial({ color: 0xffff00 }));
            keyObj.position.set(-10, 0.5, -10);
            scene.add(keyObj);

            // EXIT DOOR
            exitDoor = new THREE.Mesh(new THREE.BoxGeometry(2, 3, 0.5), new THREE.MeshPhongMaterial({ color: 0x3d2b1f }));
            exitDoor.position.set(0, 1.5, 14.5);
            scene.add(exitDoor);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            // Movement logic works even if mouse isn't fully locked
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;
            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
            if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

            controls.moveRight(-velocity.x * delta);
            controls.moveForward(-velocity.z * delta);

            // AI CHASE
            const enemySpeed = 1.6 * delta;
            const dir = new THREE.Vector3().subVectors(camera.position, chaser.position).normalize();
            chaser.position.x += dir.x * enemySpeed;
            chaser.position.z += dir.z * enemySpeed;

            // CAUGHT CHECK
            if (camera.position.distanceTo(chaser.position) < 1.3) {
                alert("OUT OF SIGHT...");
                location.reload();
            }

            // KEY CHECK
            if (!hasKey && camera.position.distanceTo(keyObj.position) < 1.5) {
                hasKey = true;
                scene.remove(keyObj);
                document.getElementById('inventory').innerText = "Inventory: Master Key";
            }

            // WIN CHECK
            if (hasKey && camera.position.distanceTo(exitDoor.position) < 2) {
                alert("YOU ESCAPED!");
                location.reload();
            }

            prevTime = time;
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
